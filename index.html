<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Tap screen */
.startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
z-index:100;
cursor:pointer;
}

/* Top text */
.topText{
position:absolute;
top:15px;
width:100%;
text-align:center;
font-size:28px;
font-family:'Great Vibes', cursive;
color:#ff4d88;
text-shadow:0 0 10px white,
0 0 20px pink,
0 0 35px pink;
z-index:5;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{
opacity:0.7;
}
to{
opacity:1;
}
}

/* Film wrapper */
.filmWrapper{
width:100%;
overflow:hidden;
position:absolute;
top:50%;
transform:translateY(-50%);
}

/* Film strip */
.film{
display:flex;
gap:10px;
width:max-content;
animation: slide 40s linear infinite;
}

/* smooth movement */
@keyframes slide{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}

/* Frame */
.frame{
width:120px;
height:200px;
background:#111;
border-radius:6px;
padding:6px;
flex-shrink:0;
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 0 10px rgba(255,105,180,0.3);
}

/* Film holes */
.frame::before,
.frame::after{
content:'';
height:8px;
background:repeating-linear-gradient(
90deg,
#000 0 8px,
#666 8px 16px
);
margin-bottom:5px;
}

/* Image */
.imgBox{
flex:1;
background:black;
overflow:hidden;
border-radius:4px;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1.5s ease;
}

.reveal img{
opacity:1;
}

/* Caption */
.caption{
margin-top:5px;
font-family:'Great Vibes', cursive;
font-size:15px;
color:#ff69b4;
text-align:center;
white-space:nowrap;
overflow:hidden;
border-right:2px solid #ff69b4;
width:0;
animation: typing 2s steps(25,end) forwards,
blink .7s infinite;
}

@keyframes typing{
from{
width:0;
}
to{
width:110px;
}
}

@keyframes blink{
50%{
border-color:transparent;
}
}

/* Final text */
.finalText{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
padding:0 15px;
font-size:16px;
line-height:1.6;
display:none;
text-shadow:0 0 10px white,
0 0 20px pink;
}

/* Mobile */
@media(max-width:600px){

.topText{
font-size:24px;
}

.frame{
width:105px;
height:180px;
}

.caption{
font-size:13px;
}

.finalText{
font-size:14px;
}

.film{
gap:8px;
animation-duration:45s;
}

}
</style>
</head>

<body>

<div class="startScreen" onclick="startSite()">
Tap to start 💖
</div>

<div class="topText">
I lovieee youuuu soo muchh ❤️
</div>

<div class="filmWrapper">
<div class="film" id="film"></div>
</div>

<div class="finalText" id="finalText">
Thankss myyy beautiful babbyygurl 💖 <br>
forr supporting me in my highs and lows… <br><br>

i promiseee thattt yourr rishabh sharmaa is fully yours… <br>
he will always support youuu and stay beside you… <br><br>

forever ❤️
</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let images = [
"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg",
"img5.jpg",
"img6.jpg",
"img7.jpg",
"img8.jpg",
"img9.jpg",
"img10.jpg"
];

let film = document.getElementById("film");

/* duplicate for smooth infinite scroll */
let allImages = images.concat(images).concat(images);

allImages.forEach((src,i)=>{

let frame = document.createElement("div");
frame.classList.add("frame");

let imgBox = document.createElement("div");
imgBox.classList.add("imgBox");

let img = document.createElement("img");
img.src = src;

let caption = document.createElement("div");
caption.classList.add("caption");
caption.innerText = "myy babbyygurl 💖";

imgBox.appendChild(img);

frame.appendChild(imgBox);
frame.appendChild(caption);

film.appendChild(frame);

/* reveal images one by one */
setTimeout(()=>{
imgBox.classList.add("reveal");
}, i*800);

});

/* start website */
function startSite(){
document.querySelector(".startScreen").style.display="none";
document.getElementById("music").play();
}

/* final message */
setTimeout(()=>{
document.getElementById("finalText").style.display="block";
}, images.length*1000 + 5000);

</script>

</body>
</html>
