<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<!-- Google Font (handwriting style) -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: linear-gradient(to bottom, #ffd6e0, #ff9eb5);
    overflow:hidden;
}

/* container */
.container{
    position:relative;
    width:100%;
    height:100vh;
}

/* polaroid */
.polaroid{
    position:absolute;
    width:220px;
    height:270px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    opacity:0;
    transform:translateY(100px) scale(0.8);
    animation: showFrame 1s forwards;
}

@keyframes showFrame{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* image box */
.imgBox{
    width:100%;
    height:75%;
    background:black;
    border-radius:5px;
    overflow:hidden;
}

.imgBox img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s ease;
}

.reveal img{
    opacity:1;
}

/* ✍️ handwriting text */
.caption{
    margin-top:8px;
    font-size:20px;
    color:#ff4d88;
    font-family:'Great Vibes', cursive;
    white-space:nowrap;
    overflow:hidden;
    border-right:2px solid #ff4d88;
    width:0;
    animation: typing 2s steps(20,end) forwards, blink 0.6s infinite;
}

/* typing animation */
@keyframes typing{
    from{width:0;}
    to{width:120px;}
}

/* cursor blink */
@keyframes blink{
    50%{border-color:transparent;}
}

/* final message */
.finalText{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:24px;
    color:white;
    display:none;
    text-shadow:0 0 10px #fff,0 0 20px pink;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container" id="container"></div>

<div class="finalText" id="finalText">
Thankss myyy beautiful babbyy 💖 <br>
forr supporting me in my highs and lows… <br><br>

i promiseee thattt yourr rishabh sharmaa is fully yours… <br>
and he will always support youuu… <br>
he will always stand besidee you… <br><br>

forever ❤️
</div>

<!-- MUSIC -->
<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let images = [
"img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg",
"img6.jpg","img7.jpg","img8.jpg","img9.jpg","img10.jpg"
];

let container = document.getElementById("container");

images.forEach((src, i) => {

    let polaroid = document.createElement("div");
    polaroid.classList.add("polaroid");

    polaroid.style.top = Math.random()*70 + "%";
    polaroid.style.left = Math.random()*70 + "%";
    polaroid.style.animationDelay = i * 1 + "s";

    let imgBox = document.createElement("div");
    imgBox.classList.add("imgBox");

    let img = document.createElement("img");
    img.src = src;

    let caption = document.createElement("div");
    caption.classList.add("caption");
    caption.innerText = "my babyy 💖";

    imgBox.appendChild(img);
    polaroid.appendChild(imgBox);
    polaroid.appendChild(caption);

    container.appendChild(polaroid);

    setTimeout(()=>{
        imgBox.classList.add("reveal");
    }, (i * 1000) + 800);

});

// show final message
setTimeout(()=>{
    document.getElementById("finalText").style.display = "block";
}, images.length * 1000 + 2000);

</script>

</body>
</html>
