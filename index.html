<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:black;
    overflow:hidden;
    color:white;
}

/* tap screen */
.startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    z-index:10;
    cursor:pointer;
}

/* film strip */
.film{
    position:absolute;
    top:50%;
    left:0;
    transform:translateY(-50%);
    display:flex;
    gap:12px;
    padding:10px;
    animation: slide 30s linear infinite;
}

/* smooth scroll */
@keyframes slide{
    0%{transform:translate(0,-50%);}
    100%{transform:translate(-50%,-50%);}
}

/* frame */
.frame{
    width:140px;
    height:220px;
    background:black;
    border:6px solid #111;
    border-radius:6px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:6px;
    flex-shrink:0;
}

/* film holes */
.frame::before,
.frame::after{
    content:'';
    height:8px;
    background: repeating-linear-gradient(
        90deg,
        #000 0 8px,
        #555 8px 16px
    );
}

/* image */
.imgBox{
    flex:1;
    background:black;
    overflow:hidden;
}

.imgBox img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s;
}

.reveal img{
    opacity:1;
}

/* handwriting */
.caption{
    font-family:'Great Vibes', cursive;
    font-size:14px;
    color:#ff4d88;
    white-space:nowrap;
    overflow:hidden;
    border-right:2px solid #ff4d88;
    width:0;
    animation: typing 2s steps(20,end) forwards, blink 0.6s infinite;
}

@keyframes typing{
    from{width:0;}
    to{width:90px;}
}

@keyframes blink{
    50%{border-color:transparent;}
}

/* final text */
.finalText{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    display:none;
    font-size:16px;
    padding:0 10px;
    line-height:1.5;
    text-shadow:0 0 8px #fff,0 0 15px pink;
}

/* 📱 MOBILE PERFECT */
@media (max-width:600px){
    .film{
        gap:8px;
        animation-duration:35s;
    }

    .frame{
        width:120px;
        height:200px;
    }

    .caption{
        font-size:13px;
    }

    .startScreen{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="startScreen" onclick="startSite()">
Tap to start 💖
</div>

<div class="film" id="film"></div>

<div class="finalText" id="finalText">
Thankss myyy beautiful babbyy 💖 <br>
forr supporting me in my highs and lows… <br><br>
i promiseee thattt yourr rishabh sharmaa is fully yours… <br>
he will always support youuu and stay beside you… <br><br>
forever ❤️
</div>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let images = [
"img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg",
"img6.jpg","img7.jpg","img8.jpg","img9.jpg","img10.jpg"
];

let film = document.getElementById("film");

/* duplicate images for smooth loop */
let allImages = images.concat(images);

allImages.forEach((src,i)=>{
    let frame = document.createElement("div");
    frame.classList.add("frame");

    let imgBox = document.createElement("div");
    imgBox.classList.add("imgBox");

    let img = document.createElement("img");
    img.src = src;

    let caption = document.createElement("div");
    caption.classList.add("caption");
    caption.innerText="my babyy 💖";

    imgBox.appendChild(img);
    frame.appendChild(imgBox);
    frame.appendChild(caption);

    film.appendChild(frame);

    setTimeout(()=>{
        imgBox.classList.add("reveal");
    }, i*1000);
});

/* start */
function startSite(){
    document.querySelector(".startScreen").style.display="none";
    document.getElementById("music").play();
}

/* final text */
setTimeout(()=>{
    document.getElementById("finalText").style.display="block";
}, images.length*1000 + 3000);

</script>

</body>
</html>
